<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Ammu ❤️</title>
<style>
body{margin:0;background:#0b1220;color:white;font-family:Arial,sans-serif;overflow:hidden}
.screen{display:none;height:100vh;padding:30px;box-sizing:border-box;justify-content:center;align-items:center;text-align:center;flex-direction:column}
.active{display:flex}
h1{color:#d4af37}
img{max-width:90%;max-height:55vh;border-radius:20px}
button{padding:14px 28px;border:none;border-radius:30px;background:#d4af37;font-weight:bold;margin-top:20px}
p{max-width:700px;line-height:1.8}
</style>
</head>
<body>

<div id="s1" class="screen active">
<h1>For Ammu ❤️</h1>
<p>A little story from your Gumma</p>
<button onclick="next(2)">Begin</button>
</div>

<div id="s2" class="screen">
<h1>Chapter 1</h1>
<img src="IMG-20260613-WA0092.jpg">
<p>The smile that stayed.</p>
<button onclick="next(3)">Continue →</button>
</div>

<div id="s3" class="screen">
<h1>Chapter 2</h1>
<p>Some people enter our lives unexpectedly and somehow become important.</p>
<button onclick="next(4)">Tell Me More →</button>
</div>

<div id="s4" class="screen">
<h1>Our Song</h1>
<iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/41poRcXRASGAqDinA3b0Vo" width="90%" height="152"></iframe>
<button onclick="next(5)">Continue The Story →</button>
</div>

<div id="s5" class="screen">
<h1>A Memory</h1>
<img id="memimg" src="IMG-20260422-WA0025.jpg">
<p id="count">Memory 1</p>
<button onclick="nextMemory()">Next Memory →</button>
</div>

<div id="s6" class="screen">
<h1>Dear Ammu</h1>
<p id="letter"></p>
<button onclick="next(7)">Before You Leave →</button>
</div>

<div id="s7" class="screen">
<h1>Some people become memories.</h1>
<p>You became a feeling.<br><br>Happy Birthday Ammu.<br>— Your Gumma ❤️</p>
</div>

<script>
function next(n){
document.querySelectorAll('.screen').forEach(x=>x.classList.remove('active'));
document.getElementById('s'+n).classList.add('active');
if(n===6) typeLetter();
}

const imgs=[
"IMG-20260422-WA0025.jpg",
"IMG-20260427-WA0021.jpg",
"IMG-20260429-WA0061.jpg",
"IMG-20260429-WA0062.jpg",
"IMG-20260429-WA0082.jpg"
];
let idx=0;
function nextMemory(){
idx++;
if(idx<imgs.length){
document.getElementById('memimg').src=imgs[idx];
document.getElementById('count').innerText='Memory '+(idx+1);
}else{
next(6);
}
}

let started=false;
function typeLetter(){
if(started) return;
started=true;
const txt="Happy Birthday Ammu. Thank you for every smile, every memory and every conversation. No matter where life takes us, you will always remain special to me. Your Gumma.";
let i=0;
function t(){
if(i<txt.length){
document.getElementById('letter').innerHTML+=txt.charAt(i);
i++;
setTimeout(t,30);
}
}
t();
}
</script>

</body>
</html>
