<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0"><title>For My Ammu ❤️</title><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&family=Great+Vibes&display=swap" rel="stylesheet"><style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Poppins',sans-serif;
background:linear-gradient(135deg,#ff758c,#ff7eb3);
overflow-x:hidden;
color:white;
}

#welcome{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.card{
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:40px;
border-radius:30px;
max-width:500px;
}

.card h1{
font-family:'Great Vibes',cursive;
font-size:4rem;
}

.card button{
margin-top:20px;
padding:15px 30px;
border:none;
border-radius:30px;
background:white;
color:#ff4081;
font-weight:bold;
font-size:18px;
}

.hero{
min-height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
padding:20px;
text-align:center;
}

.hero img{
width:300px;
height:300px;
object-fit:cover;
border-radius:50%;
border:6px solid white;
box-shadow:0 0 40px rgba(255,255,255,.5);
}

.hero h1{
font-family:'Great Vibes',cursive;
font-size:5rem;
margin-top:20px;
}

.glass{
width:92%;
max-width:900px;
margin:25px auto;
background:rgba(255,255,255,.15);
backdrop-filter:blur(15px);
padding:30px;
border-radius:25px;
}

#typewriter{
white-space:pre-line;
line-height:1.8;
font-size:18px;
}

.slider{
overflow:hidden;
position:relative;
}

.slide-track{
display:flex;
width:max-content;
animation:scroll 50s linear infinite;
}

.slide-track img{
width:250px;
height:350px;
object-fit:cover;
margin:10px;
border-radius:20px;
cursor:pointer;
transition:.4s;
}

.slide-track img:hover{
transform:scale(1.08);
}

@keyframes scroll{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

#lightbox{
display:none;
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
justify-content:center;
align-items:center;
z-index:99999;
}

#lightbox img{
max-width:90%;
max-height:90%;
border-radius:20px;
}

#finalSurprise{
text-align:center;
padding:60px;
}

#finalBtn{
padding:15px 35px;
font-size:20px;
border:none;
border-radius:40px;
background:white;
color:#ff4081;
font-weight:bold;
}

.floating{
position:fixed;
bottom:-50px;
font-size:24px;
animation:floatUp linear infinite;
pointer-events:none;
}

@keyframes floatUp{
to{
transform:translateY(-120vh);
opacity:0;
}
}

footer{
padding:50px;
text-align:center;
}

</style></head><body><script>

const pass = prompt("❤️ A little surprise from your Gumma...");

if(pass !== "OnlyAmmuKnows❤️"){

document.body.innerHTML="<h1 style='padding-top:150px;text-align:center;'>❤️ Access Denied ❤️</h1>";

throw new Error();

}

</script><div id="welcome"><div class="card"><h1>Ammu ❤️</h1><p>A message from your Gumma</p><button onclick="openSurprise()">
Open My Heart ❤️

❤️ One Last Thing...
</button></div><footer>Made With Love ❤️

  
</footer><div id="lightbox"><img id="lightboxImg"></div><script>

const letter = `

Dear Ammu ❤️,

I don't know if words will ever be enough.

Some people enter our lives and become memories.

You became a feeling.

The truth is our journey was never perfect.
We had our ups and downs, confusion, silence,
and moments where neither of us knew what tomorrow would bring.

Yet somehow, every time I think about the moments that made me smile,
your face is always there.

Your laughter has a strange power.
It makes worries disappear for a while.
Your kindness makes people feel valued.
And your presence brings a comfort that is impossible to explain.

There were days when life felt heavy,
and a simple message from you made everything feel lighter.

Not because you solved my problems.

But because you were you.

Thank you for every conversation.
Thank you for every memory.
Thank you for every smile.

I don't know what life has planned for us.

But I know this.

You'll always be someone special to me.

No matter where life takes us,
you'll always be my Ammu.

And I'll always smile when I hear you call me Gumma.

Happy Birthday Ammu ❤️

Forever cheering for your happiness,

Your Gumma ❤️

`;

let i=0;

function typeWriter(){

if(i<letter.length){

document.getElementById("typewriter").innerHTML += letter.charAt(i);

i++;

setTimeout(typeWriter,35);

}

}

function openSurprise(){

document.getElementById("welcome").style.display="none";

document.getElementById("content").style.display="block";

typeWriter();

for(let i=0;i<120;i++){

setTimeout(()=>{

const heart=document.createElement("div");

heart.innerHTML="💖";

heart.style.position="fixed";

heart.style.left=Math.random()*window.innerWidth+"px";

heart.style.top=window.innerHeight+"px";

heart.style.fontSize="30px";

document.body.appendChild(heart);

heart.animate([
{transform:"translateY(0)"},
{transform:"translateY(-1000px)"}
],{
duration:5000
});

setTimeout(()=>heart.remove(),5000);

},i*40);

}

}

setInterval(()=>{

const heart=document.createElement("div");

heart.className="floating";

heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"vw";

heart.style.animationDuration=(4+Math.random()*6)+"s";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),10000);

},700);

document.querySelectorAll(".slide-track img").forEach(img=>{

img.addEventListener("click",()=>{

document.getElementById("lightbox").style.display="flex";

document.getElementById("lightboxImg").src=img.src;

for(let i=0;i<25;i++){

setTimeout(()=>{

const heart=document.createElement("div");

heart.innerHTML="❤️";

heart.style.position="fixed";

heart.style.left=(Math.random()*window.innerWidth)+"px";

heart.style.top=(Math.random()*window.innerHeight)+"px";

heart.style.fontSize="24px";

document.body.appendChild(heart);

heart.animate([
{opacity:1},
{opacity:0}
],{
duration:1500
});

setTimeout(()=>heart.remove(),1500);

},i*50);

}

});

});

document.getElementById("lightbox").onclick=function(){

this.style.display="none";

}

document.getElementById("finalBtn").onclick=function(){

alert("❤️ Thank you for being part of my life, Ammu. Some people become memories. You became a feeling. ❤️");

}

</script></body>
</html>
